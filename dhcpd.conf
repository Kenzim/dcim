# DHCP Server Configuration File
# ISC DHCP Server (dhcpd) configuration
# Location: /root/dcim/dhcpd.conf
# Interface: eth1 (192.168.12.74)

# Default lease time (in seconds)
default-lease-time 3600;

# Maximum lease time (in seconds)
max-lease-time 7200;

# Logging
log-facility local7;

# Authoritative DHCP server
authoritative;

# Subnet configuration for 192.168.12.0/24
subnet 192.168.12.0 netmask 255.255.255.0 {
    # Range of IP addresses to lease
    # Excluding 192.168.12.80 which is reserved
    range 192.168.12.100 192.168.12.200;
    
    # Subnet mask
    option subnet-mask 255.255.255.0;
    
    # Broadcast address
    option broadcast-address 192.168.12.255;
    
    # Default lease time for this subnet
    default-lease-time 3600;
    max-lease-time 7200;
}

# Static IP reservation with PXE boot
# MAC: 00:0e:1e:6f:16:b0 -> IP: 192.168.12.80
host reserved-host {
    hardware ethernet 00:0e:1e:6f:16:b0;
    fixed-address 192.168.12.80;
    next-server 192.168.12.74;
    
    # First boot: Load iPXE loader via TFTP
    # Try smallest binary first (undionly.kpxe is 70K - smallest available)
    # If this still fails, the network card may have very limited memory
    filename "pxe/undionly.kpxe";
    
    # Alternative: Use snponly.efi for UEFI systems (if undionly.kpxe fails)
    # Uncomment below and comment above if needed:
    # filename "pxe/snponly.efi";
    
    # When iPXE is already loaded (identifies with user-class "iPXE"), 
    # serve the boot script from our API via HTTP
    # iPXE supports HTTP URLs in the filename option and can use ${mac} variable
    if exists user-class and option user-class = "iPXE" {
        # Use HTTP to fetch boot script from our API
        # iPXE will expand ${mac} with its MAC address (e.g., 00:0e:1e:6f:16:b0)
        # The API will look up the server by MAC address and return the appropriate boot script
                filename "http://192.168.12.74:8000/api/servers/interaction/pxe?mac=${mac}";
    }
}


