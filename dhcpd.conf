# DHCP Server Configuration File
# Generated automatically by DCIM system
# DO NOT EDIT MANUALLY - Changes will be overwritten

# Default lease time (in seconds)
default-lease-time 3600;

# Maximum lease time (in seconds)
max-lease-time 7200;

# Logging
log-facility local7;

# Authoritative DHCP server
authoritative;

# Subnet configuration for 192.168.12.0/24
subnet 192.168.12.0 netmask 255.255.255.0 {
    # DHCP leases disabled - only serving PXE boot
    
    # Subnet mask
    option subnet-mask 255.255.255.0;
    
    # Broadcast address
    option broadcast-address 192.168.12.255;
    
    # Default lease time for this subnet
    default-lease-time 3600;
    max-lease-time 7200;
}

# Server: ryzen home (MAC: 00:0E:1E:6F:16:B0)
host reserved-host1 {
    hardware ethernet 00:0E:1E:6F:16:B0;
    fixed-address 192.168.12.80;
    next-server 192.168.12.74;
    
    # First boot: Load iPXE loader via TFTP
    filename "pxe/snponly.efi";
    
    # When iPXE is already loaded, serve boot script from backend API
    if exists user-class and option user-class = "iPXE" {
        filename "http://192.168.12.74:8000/api/servers/interaction/pxe?mac=${mac:hexhyp}";
    }
}

