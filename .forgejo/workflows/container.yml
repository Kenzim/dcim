name: Container Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    env:
      DOCKER_BUILDKIT: "0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: app
            context: .
            dockerfile: Dockerfile
            target: app
          - image_suffix: bandwidth-poller
            context: .
            dockerfile: Dockerfile
            target: bandwidth-poller
          - image_suffix: dhcp-runner
            context: dhcp_runner
            dockerfile: dhcp_runner/Dockerfile
            target: ""
          - image_suffix: tftp-runner
            context: .
            dockerfile: tftp_runner/Dockerfile
            target: ""
          - image_suffix: proxy-runner
            context: proxy_runner
            dockerfile: proxy_runner/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docker daemon
        run: |
          set -eu
          command -v docker >/dev/null 2>&1 || { echo "docker CLI missing in job container" >&2; exit 1; }
          docker info

      - name: Resolve Forgejo registry image
        run: |
          REGISTRY_HOST_RAW="${GITHUB_SERVER_URL:-${GITHUB_SERVER:-}}"
          if [ -z "${REGISTRY_HOST_RAW}" ]; then
            echo "Unable to resolve Forgejo server URL from GITHUB_SERVER_URL/GITHUB_SERVER." >&2
            exit 1
          fi

          REGISTRY_HOST="$(echo "${REGISTRY_HOST_RAW}" | sed -E 's#^https?://##')"
          IMAGE_REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          SAFE_REF_NAME="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g')"
          IMAGE_NAME="${REGISTRY_HOST}/${IMAGE_REPO}-${{ matrix.image_suffix }}"

          echo "REGISTRY_HOST=${REGISTRY_HOST}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"
          echo "SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "${GITHUB_ENV}"
          echo "SAFE_REF_NAME=${SAFE_REF_NAME}" >> "${GITHUB_ENV}"

      - name: Build image
        run: |
          BUILD_TARGET_ARGS=""
          if [ -n "${{ matrix.target }}" ]; then
            BUILD_TARGET_ARGS="--target ${{ matrix.target }}"
          fi

          docker build ${BUILD_TARGET_ARGS} \
            -f "${{ matrix.dockerfile }}" \
            -t "${IMAGE_NAME}:${SHORT_SHA}" \
            "${{ matrix.context }}"

          if [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            docker tag "${IMAGE_NAME}:${SHORT_SHA}" "${IMAGE_NAME}:branch-${SAFE_REF_NAME}"
          fi
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            docker tag "${IMAGE_NAME}:${SHORT_SHA}" "${IMAGE_NAME}:latest"
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            docker tag "${IMAGE_NAME}:${SHORT_SHA}" "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi

      - name: Login to registry
        if: github.event_name != 'pull_request'
        run: |
          REGISTRY_USER="${{ secrets.REGISTRY_USER }}"
          REGISTRY_TOKEN="${{ secrets.REGISTRY_TOKEN }}"
          if [ -z "${REGISTRY_TOKEN}" ]; then
            REGISTRY_TOKEN="${{ secrets.PACKAGE_WRITABLE_TOKEN }}"
          fi
          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_TOKEN}" ]; then
            echo "Missing registry creds. Set REGISTRY_USER and REGISTRY_TOKEN (or PACKAGE_WRITABLE_TOKEN)." >&2
            exit 1
          fi
          echo "${REGISTRY_TOKEN}" | docker login "${REGISTRY_HOST}" \
            --username "${REGISTRY_USER}" \
            --password-stdin

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_NAME}:${SHORT_SHA}" || {
            echo "Push failed. Ensure token has package write permission for ${IMAGE_NAME}." >&2
            exit 1
          }
          if [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            docker push "${IMAGE_NAME}:branch-${SAFE_REF_NAME}"
          fi
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            docker push "${IMAGE_NAME}:latest"
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi
