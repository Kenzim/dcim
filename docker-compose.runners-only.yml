# Deploy DHCP and TFTP runners at a remote datacenter location.
# The central DCIM backend connects to these runners via base_url.
# Uses host networking like docker-compose.registry.yml. Example:
#   docker compose -f docker-compose.runners-only.yml up -d --build
services:
  dhcp-runner:
    build:
      context: dhcp_runner
      dockerfile: Dockerfile
    network_mode: host
    environment:
      DHCP_CONFIG_PATH: /shared/dhcp/dhcpd.conf
      DHCP_LEASE_PATH: /shared/dhcp/dhcpd.leases
      DHCP_INTERFACES: ${DHCP_INTERFACES:-eth0}
    volumes:
      - dhcp_shared:/shared
    restart: unless-stopped

  tftp-runner:
    build:
      context: .
      dockerfile: tftp_runner/Dockerfile
    network_mode: host
    environment:
      TFTP_ROOT: /shared/tftp
      TFTP_BIND: 0.0.0.0:69
    restart: unless-stopped

  proxy-runner:
    build:
      context: proxy_runner
      dockerfile: Dockerfile
    network_mode: host
    environment:
      RACKFLOW_BASE_URL: ${RACKFLOW_BASE_URL}
      RUNNER_API_KEY: ${PROXY_RUNNER_API_KEY}
      SYNC_INTERVAL_SECONDS: ${PROXY_SYNC_INTERVAL_SECONDS:-10}
    restart: unless-stopped

volumes:
  dhcp_shared:
